/* ───────────────────────────────────────────────────── HEADER ───────────────────────────────────────────────────── */

      /* ---------- HEADER ---------- */
      
      .site-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 5rem;
        z-index: 200;
        background: transparent;
        display: flex;
        align-items: center;
        padding: 0 3vw;
      }
      
      /* ---------- NAVBAR ---------- */
      
      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 5rem;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 3vw;
        z-index: 1000;
      }

      /* ---------- LOGO ---------- */
      
      .navbar-logo {
        display: flex;
        align-items: center;
        height: 100%;
        flex-shrink: 0;
      }

      .navbar-logo img {
        height: 4rem;
        width: auto;
        display: block;
      }

      /* ---------- HAMBURGER BUTTON ---------- */
      
      .hamburger {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        width: 2.4rem;
        height: 2.4rem;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0.2rem;
        flex-shrink: 0;
        z-index: 1100;
      }

      .hamburger .bar {
        display: block;
        width: 1.7rem;
        height: 2.5px;
        background-color: #006400;
        border-radius: 2px;
        transition: transform 0.3s ease, opacity 0.3s ease, background-color 0.3s ease;
        transform-origin: center;
      }

      .hamburger.is-open .bar:nth-child(1) {
        transform: translateY(7.5px) rotate(45deg);
        background-color: #00004D;
      }
    
      .hamburger.is-open .bar:nth-child(2) {
        opacity: 0;
        transform: scaleX(0);
      }
    
      .hamburger.is-open .bar:nth-child(3) {
        transform: translateY(-7.5px) rotate(-45deg);
        background-color: #00004D;
      }

      /* ---------- HAMBURGER DROP DOWN MENU ---------- */
      
      .mobile-menu {
        display: none;
        position: fixed;
        top: 5rem;
        right: 3vw;
        width: min(22rem, 90vw);
        text-align: center;
        background-color: #00006D;
        border-radius: 0.5rem;
        flex-direction: column;
        z-index: 999;
        overflow: hidden;
        max-height: 0;
        transition: max-height 0.35s ease;
      }

      .mobile-menu.is-open {
        display: flex;
        max-height: 50vh;
      }

      .mobile-menu a {
        font-size: 1.1rem;
        color: white;
        font-weight: 700;
        text-decoration: none;
        padding: 1rem 3vw;
        border-bottom: 1px solid rgba(0, 0, 0, 0.12);
        display: block;
      }

      .mobile-menu a:last-child {
        border-bottom: none;
      }

/* ───────────────────────────────────────────────── MEDIA QUERIES ────────────────────────────────────────────────── */

      /* ---------- 1024px ---------- */
      
      @media (max-width: 1024px) {
        .mobile-menu a:hover {

      }

      /* ---------- 700px ---------- */

        text-align: center;
        text-decoration: underline;
        text-decoration-color: #00006D;
        text-decoration-thickness: 3px;
        letter-spacing: 0.08em;

      /* ---------- BUTTONS ---------- */
      
      .buttons {
        display: flex;
        flex-direction: column;
        gap: 2rem;
        width: 100%;
        align-items: center;
      }

      .contact-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;

        max-width: 320px;
        padding: 0.8rem 1.5rem;
        border-radius: 0.5rem;
        font-family: Arial, sans-serif;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.2s ease;
        text-decoration: none;
      }

      /* ---------- WHATSAPP BUTTON ---------- */
      
      .whatsapp-button {

      }
      
      .whatsapp-button .button-icon {

      }

      .whatsapp-button:hover {

      /* ---------- EMAIL BUTTON ---------- */
    
      .email-button {
        color: white;
        background-color: #00006D;

      .email-button .button-icon {

      }

      /* ---------- SUBMIT BUTTON ---------- */
    
      .submit-button {

        border: none;
        border-radius: 0.5rem;

      /* ---------- FORM ---------- */

      .enquiry-form textarea {

      /* ---------- CAPTCHA ---------- */

        text-align: center;

/* ───────────────────────────────────────────────── MEDIA QUERIES ────────────────────────────────────────────────── */

        }

    <script>
      const hamburger = document.getElementById('hamburger');
      const mobileMenu = document.getElementById('mobileMenu');

      hamburger.addEventListener('click', () => {
        const isOpen = hamburger.classList.toggle('is-open');
        hamburger.setAttribute('aria-expanded', isOpen);

        if (isOpen) {
          mobileMenu.classList.add('is-open');
        } else {
          mobileMenu.classList.remove('is-open');
        }
      });

      mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          hamburger.classList.remove('is-open');
          hamburger.setAttribute('aria-expanded', false);
          mobileMenu.classList.remove('is-open');
        });
      });

      document.addEventListener('click', (e) => {
        if (!hamburger.contains(e.target) && !mobileMenu.contains(e.target)) {
          hamburger.classList.remove('is-open');
          hamburger.setAttribute('aria-expanded', false);
          mobileMenu.classList.remove('is-open');
        }
      });
    </script>
